<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NXT CORE | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(138, 43, 226, 0.5);
      border-radius: 50%;
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% { opacity: 0.6; }
      90% { opacity: 0.4; }
      100% {
        transform: translateY(-100px) translateX(80px);
        opacity: 0;
      }
    }

    .card {
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(138, 43, 226, 0.4);
      border-radius: 32px;
      padding: 45px 40px;
      width: 100%;
      max-width: 420px;
      z-index: 2;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      animation: fadeInUp 0.6s ease-out;
      margin: 20px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #8a2be2, #4b0082, #8a2be2);
      border-radius: 34px;
      z-index: -1;
      opacity: 0.5;
      animation: borderGlow 3s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto;
      background: linear-gradient(135deg, #8a2be2, #4b0082);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
      color: white;
      box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
      border: 2px solid rgba(138, 43, 226, 0.8);
    }

    .title {
      font-size: 38px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      text-align: center;
      margin-top: 15px;
      background: linear-gradient(135deg, #8a2be2, #b88aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #b88aff;
      margin-top: 5px;
      margin-bottom: 30px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #8a2be2;
      font-size: 18px;
      z-index: 1;
    }

    input {
      width: 100%;
      padding: 16px 18px 16px 50px;
      background: rgba(26, 26, 26, 0.9);
      border: 1px solid rgba(138, 43, 226, 0.4);
      border-radius: 16px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #8a2be2;
      box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8a2be2, #4b0082);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(138, 43, 226, 0.5);
    }

    button:hover::before {
      left: 100%;
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 10px;
      color: rgba(184, 138, 255, 0.5);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      border-left: 4px solid #8a2be2;
      padding: 12px 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      animation: toastSlide 0.3s ease;
    }

    @keyframes toastSlide {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 35px 25px;
        margin: 20px;
      }
      .title {
        font-size: 30px;
      }
      .logo-icon {
        width: 80px;
        height: 80px;
        font-size: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">NX</div>
      <div class="title">NXT CORE</div>
      <div class="subtitle">NXT CORE ACCESS SYSTEM</div>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="username" placeholder="Username" autocomplete="off" required>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> ACCESS NXT CORE
      </button>
    </form>

    <div class="footer">
      <i class="fas fa-shield-alt"></i> NXT CORE Security System v1.0
    </div>
  </div>

  <div id="toast" style="display: none;"></div>

  <script>
    // ==================== 5 AKUN ====================
    const ACCOUNTS = [
      { username: "zetsu", password: "zetsu123", level: "Owner" },
      { username: "owner", password: "owner123", level: "Admin" },
      { username: "reseller", password: "reseller123", level: "Reseller" },
      { username: "vip", password: "vip123", level: "VIP" },
      { username: "user", password: "user123", level: "Basic" }
    ];
    // ==============================================

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
      toast.style.display = 'flex';
      toast.style.background = isError ? '#8B0000' : '#1a1a2e';
      
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        showToast("Isi username dan password dulu!", true);
        return false;
      }
      
      const found = ACCOUNTS.find(acc => 
        acc.username.toLowerCase() === username.toLowerCase() && 
        acc.password === password
      );
      
      if (found) {
        showToast(`✓ Login berhasil! Selamat datang, ${found.username} (${found.level})`, false);
        
        localStorage.setItem('nxt_logged_in', 'true');
        localStorage.setItem('nxt_user', found.username);
        localStorage.setItem('nxt_level', found.level);
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } else {
        showToast("Username atau password salah! Akses ditolak.", true);
      }
      
      return false;
    }

    function createParticles() {
      const container = document.getElementById('particles');
      const particleCount = 45;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        const size = Math.random() * 5 + 2;
        const left = Math.random() * 100;
        const duration = Math.random() * 12 + 10;
        const delay = Math.random() * 15;
        
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${left}%`;
        particle.style.animationDuration = `${duration}s`;
        particle.style.animationDelay = `${delay}s`;
        
        container.appendChild(particle);
      }
    }

    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    createParticles();
  </script>
</body>
</html>
