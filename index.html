<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ZETSU | Login System</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Particle background */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(138, 43, 226, 0.6);
      border-radius: 50%;
      filter: blur(2px);
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% {
        transform: translateY(-100px) translateX(100px);
        opacity: 0;
      }
    }

    /* Card utama */
    .card {
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(138, 43, 226, 0.4);
      border-radius: 32px;
      padding: 45px 40px;
      width: 100%;
      max-width: 450px;
      z-index: 2;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(138, 43, 226, 0.2);
      animation: fadeInUp 0.6s ease-out;
      margin: 20px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Efek glitch border */
    .card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #8a2be2, #4b0082, #8a2be2);
      border-radius: 34px;
      z-index: -1;
      opacity: 0.5;
      animation: borderGlow 3s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto;
      background: linear-gradient(135deg, #8a2be2, #4b0082);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
      color: white;
      text-shadow: 0 0 15px rgba(138, 43, 226, 0.8);
      box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
      border: 2px solid rgba(138, 43, 226, 0.8);
    }

    .title {
      font-size: 38px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      text-align: center;
      margin-top: 15px;
      background: linear-gradient(135deg, #8a2be2, #b88aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #b88aff;
      margin-top: 5px;
      margin-bottom: 30px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #8a2be2;
      font-size: 18px;
      z-index: 1;
      transition: all 0.3s;
    }

    input {
      width: 100%;
      padding: 16px 18px 16px 50px;
      background: rgba(26, 26, 26, 0.9);
      border: 1px solid rgba(138, 43, 226, 0.4);
      border-radius: 16px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #8a2be2;
      box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
      background: rgba(26, 26, 26, 1);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8a2be2, #4b0082);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(138, 43, 226, 0.5);
    }

    button:hover::before {
      left: 100%;
    }

    .demo-accounts {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(138, 43, 226, 0.3);
    }

    .demo-title {
      font-size: 11px;
      text-align: center;
      color: rgba(184, 138, 255, 0.7);
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .account-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .account-badge {
      background: rgba(138, 43, 226, 0.2);
      border: 1px solid rgba(138, 43, 226, 0.4);
      border-radius: 20px;
      padding: 8px 15px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #b88aff;
    }

    .account-badge:hover {
      background: rgba(138, 43, 226, 0.4);
      transform: scale(1.02);
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 10px;
      color: rgba(184, 138, 255, 0.5);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      border-left: 4px solid #8a2be2;
      padding: 12px 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      animation: toastSlide 0.3s ease;
    }

    @keyframes toastSlide {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 35px 25px;
        margin: 20px;
      }
      
      .title {
        font-size: 30px;
      }
      
      .logo-icon {
        width: 80px;
        height: 80px;
        font-size: 38px;
      }
    }
  </style>
</head>

<body>
  <div class="particles" id="particles"></div>
  
  <div class="card">
    <div class="logo">
      <div class="logo-icon">Z</div>
      <div class="title">ZETSU</div>
      <div class="subtitle">OVERLOAD-X ACCESS SYSTEM</div>
    </div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="username" placeholder="Username" autocomplete="off" required>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> ACCESS DASHBOARD
      </button>
    </form>

    <div class="demo-accounts">
      <div class="demo-title">
        <i class="fas fa-users"></i> TEST ACCOUNTS (Click to Auto Fill)
      </div>
      <div class="account-list" id="accountList">
        <!-- Akan diisi JS -->
      </div>
    </div>

    <div class="footer">
      <i class="fas fa-shield-alt"></i> ZETSU Security System v1.0
    </div>
  </div>

  <div id="toast" style="display: none;"></div>

  <script>
    // ==================== DATABASE AKUN ====================
    const ACCOUNTS = [
      { username: "zetsu", password: "overload", level: "Owner" },
      { username: "admin", password: "admin123", level: "Admin" },
      { username: "user", password: "user123", level: "Basic" },
      { username: "reseller", password: "reseller123", level: "Reseller" },
      { username: "syall", password: "syall123", level: "VIP" },
      { username: "tes", password: "123", level: "Tester" }
    ];

    // Initialize localStorage
    function initAccounts() {
      if (!localStorage.getItem('zetsu_accounts')) {
        localStorage.setItem('zetsu_accounts', JSON.stringify(ACCOUNTS));
      }
    }

    function getAccounts() {
      return JSON.parse(localStorage.getItem('zetsu_accounts') || JSON.stringify(ACCOUNTS));
    }

    // Render demo accounts
    function renderDemoAccounts() {
      const accounts = getAccounts();
      const container = document.getElementById('accountList');
      
      if (!container) return;
      
      container.innerHTML = accounts.map(acc => `
        <div class="account-badge" onclick="fillLogin('${acc.username}', '${acc.password}')">
          <i class="fas fa-key"></i>
          ${acc.username}
        </div>
      `).join('');
    }

    // Auto fill login form
    window.fillLogin = function(username, password) {
      document.getElementById('username').value = username;
      document.getElementById('password').value = password;
      showToast(`✓ Username: ${username} terisi`, false);
    };

    // Show toast notification
    let toastTimeout;
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
      toast.style.display = 'flex';
      toast.style.background = isError ? '#8B0000' : '#1a1a2e';
      
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    // Handle login
    function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        showToast("Masukkan username dan password!", true);
        return false;
      }
      
      const accounts = getAccounts();
      const validAccount = accounts.find(acc => 
        acc.username.toLowerCase() === username.toLowerCase() && 
        acc.password === password
      );
      
      if (validAccount) {
        showToast(`✓ Login berhasil! Selamat datang, ${validAccount.username}`, false);
        
        // Simpan session user
        localStorage.setItem('zetsu_current_user', JSON.stringify(validAccount));
        
        // Redirect ke dashboard Overload-X
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } else {
        showToast("Username atau password salah! Akses ditolak.", true);
      }
      
      return false;
    }

    // Create floating particles
    function createParticles() {
      const container = document.getElementById('particles');
      const particleCount = 50;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        const size = Math.random() * 4 + 2;
        const left = Math.random() * 100;
        const duration = Math.random() * 12 + 8;
        const delay = Math.random() * 15;
        
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${left}%`;
        particle.style.animationDuration = `${duration}s`;
        particle.style.animationDelay = `${delay}s`;
        
        container.appendChild(particle);
      }
    }

    // Initialize
    initAccounts();
    renderDemoAccounts();
    createParticles();
  </script>
</body>

</html>
